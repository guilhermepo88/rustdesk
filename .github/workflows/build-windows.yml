name: Build RustDesk Windows (FAST)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: "15.0.6"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.75
          targets: x86_64-pc-windows-msvc

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 120deac3062162151622ca4860575a33844ba10b

      - name: Install dependencies
        shell: pwsh
        run: |
          $env:VCPKG_DEFAULT_HOST_TRIPLET="x64-windows-static"
          & "$env:VCPKG_ROOT\vcpkg.exe" install

      - name: Build RustDesk
        shell: pwsh
        run: |
          python build.py --portable --hwcodec --flutter --skip-portable-pack

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: flutter/build/windows/x64/runner/Release
