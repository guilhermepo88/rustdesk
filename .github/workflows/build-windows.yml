name: Build RustDesk Windows (LIGHT)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    env:
      LIBCLANG_PATH: "C:\\Program Files\\LLVM\\bin"
      RUST_VERSION: "1.75"
      FLUTTER_VERSION: "3.24.5"

    steps:
      # ─────────────────────────────
      # CHECKOUT
      # ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ─────────────────────────────
      # TOOLCHAIN
      # ─────────────────────────────
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: "15.0.6"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      # ─────────────────────────────
      # CACHE (opcional mas útil)
      # ─────────────────────────────
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # ─────────────────────────────
      # BUILD (SEM CODEC)
      # ─────────────────────────────
      - name: Build RustDesk (LIGHT)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          python build.py --portable --flutter --skip-portable-pack

      # ─────────────────────────────
      # OUTPUT
      # ─────────────────────────────
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-light
          path: flutter/build/windows/x64/runner/Release/**
